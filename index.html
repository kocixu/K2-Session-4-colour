<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小畫家：認文字</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border-radius: 10px; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 900, height: 600 },
    backgroundColor: '#ffffff',
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

const LEVEL1_COLORS = [
    { key: 'red', text: '紅色', hex: 0xff0000 },
    { key: 'yellow', text: '黃色', hex: 0xffff00 },
    { key: 'green', text: '綠色', hex: 0x00ff00 },
    { key: 'blue', text: '藍色', hex: 0x0000ff }
];

const LEVEL2_COLORS = [
    ...LEVEL1_COLORS,
    { key: 'orange', text: '橙色', hex: 0xffa500 },
    { key: 'purple', text: '紫色', hex: 0x800080 },
    { key: 'black', text: '黑色', hex: 0x333333 },
    { key: 'white', text: '白色', hex: 0xe8e8e8 }
];

const OBJECTS = ['bottle', 'bag', 'towel', 'paper', 'shoe', 'tissue'];

let brush, mainObject, currentTarget, wordCards = [], currentLevel = [];
let trialCount = 0, scoreText, menuContainer;

function preload() {
    this.load.image('brush', 'assets/brush.png');
    OBJECTS.forEach(obj => this.load.image(obj, `assets/${obj}.png`));
    
    const allKeys = ['red', 'yellow', 'green', 'blue', 'orange', 'purple', 'black', 'white'];
    allKeys.forEach(c => this.load.audio(c + '_vo', `assets/${c}_vo.mp3`));
    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');
}

function create() {
    showLevelMenu(this);
}

function showLevelMenu(scene) {
    menuContainer = scene.add.container(450, 300).setDepth(100);
    let bg = scene.add.rectangle(0, 0, 900, 600, 0x000000, 0.8);
    let btn1 = createMenuBtn(scene, -60, '第一關 (基礎)', () => setupGame(scene, LEVEL1_COLORS));
    let btn2 = createMenuBtn(scene, 60, '第二關 (進階)', () => setupGame(scene, LEVEL2_COLORS));
    menuContainer.add([bg, btn1, btn2]);
}

function createMenuBtn(scene, y, label, callback) {
    let btn = scene.add.container(0, y);
    let rect = scene.add.rectangle(0, 0, 300, 80, 0xFFA500).setInteractive().setStrokeStyle(4, 0xffffff);
    let txt = scene.add.text(0, 0, label, { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);
    btn.add([rect, txt]);
    rect.on('pointerdown', callback);
    return btn;
}

function setupGame(scene, colorList) {
    currentLevel = colorList;
    menuContainer.destroy();
    if (scene.sound.context.state === 'suspended') scene.sound.context.resume();

    // LEFT SIDE: The Object (Scaled Proportionally)
    mainObject = scene.add.image(280, 300, OBJECTS[0]);
    fixScaling(mainObject, 350); 

    createWordPalette(scene);

    // BOTTOM RIGHT: The Brush
    brush = scene.add.image(750, 520, 'brush').setDisplaySize(110, 110).setDepth(20).setInteractive();
    brush.setData('startX', 750).setData('startY', 520);
    
    scoreText = scene.add.text(450, 40, '進度: 0/10', { fontSize: '28px', fill: '#333', fontWeight: 'bold' }).setOrigin(0.5);

    scene.input.setDraggable(brush);
    scene.input.on('drag', (p, obj, dx, dy) => { obj.x = dx; obj.y = dy; });
    scene.input.on('dragend', (p, obj) => checkAnswer(scene, obj));

    startNewRound(scene);
}

// Fixed scaling function to prevent stretching
function fixScaling(img, maxSize) {
    let ratio = img.width / img.height;
    if (img.width > img.height) {
        img.displayWidth = maxSize;
        img.displayHeight = maxSize / ratio;
    } else {
        img.displayHeight = maxSize;
        img.displayWidth = maxSize * ratio;
    }
}

function createWordPalette(scene) {
    currentLevel.forEach((color, index) => {
        let x = 650 + (index % 2 * 140);
        let y = 140 + (Math.floor(index / 2) * 110);
        
        let card = scene.add.container(x, y);
        let rect = scene.add.rectangle(0, 0, 120, 80, color.hex, 0.2).setStrokeStyle(3, color.hex);
        let txt = scene.add.text(0, 0, color.text, { fontSize: '32px', fill: '#333', fontWeight: 'bold' }).setOrigin(0.5);
        
        card.add([rect, txt]);
        card.setData('colorKey', color.key).setData('hex', color.hex);
        wordCards.push(card);
    });
}

function startNewRound(scene) {
    if (trialCount >= 10) {
        if (scene.cache.audio.exists('congrats')) scene.sound.play('congrats');
        scene.add.rectangle(450, 300, 900, 600, 0x000000, 0.8).setDepth(1000);
        scene.add.text(450, 300, '你好叻呀！', { fontSize: '64px', fill: '#fff' }).setOrigin(0.5).setDepth(1001);
        scene.time.delayedCall(4000, () => window.location.reload());
        return;
    }
    
    brush.setPosition(750, 520).clearTint();
    mainObject.setTexture(Phaser.Utils.Array.GetRandom(OBJECTS));
    fixScaling(mainObject, 350);
    mainObject.clearTint();
    
    currentTarget = Phaser.Utils.Array.GetRandom(currentLevel);
    scene.sound.play(currentTarget.key + '_vo');
}

function checkAnswer(scene, obj) {
    let matched = null;
    wordCards.forEach(card => {
        let dist = Phaser.Math.Distance.Between(obj.x, obj.y, card.x, card.y);
        if (dist < 70) matched = card; // Generous hit area for 5yo
    });

    if (matched && matched.getData('colorKey') === currentTarget.key) {
        scene.sound.play('correct');
        mainObject.setTint(matched.getData('hex'));
        obj.setTint(matched.getData('hex'));
        trialCount++;
        scoreText.setText(`進度: ${trialCount}/10`);
        scene.time.delayedCall(1500, () => startNewRound(scene));
    } else {
        scene.sound.play('wrong');
        scene.tweens.add({ targets: obj, x: obj.getData('startX'), y: obj.getData('startY'), duration: 400, ease: 'Power2' });
    }
}
</script>
</body>
</html>
