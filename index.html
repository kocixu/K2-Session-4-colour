<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聽音認色</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #fdfcf5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
<script>
window.onerror = function() { return false; }; 

const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 900, height: 600 },
    backgroundColor: '#fffdf0',
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

const COLORS = {
    red: { text: '紅色', hex: 0xff4d4d },
    yellow: { text: '黃色', hex: 0xfffa65 },
    green: { text: '綠色', hex: 0x32ff7e },
    blue: { text: '藍色', hex: 0x18dcff },
    orange: { text: '橙色', hex: 0xffaf40 },
    purple: { text: '紫色', hex: 0xc56cf0 },
    black: { text: '黑色', hex: 0x3d3d3d },
    white: { text: '白色', hex: 0xffffff }
};

const OBJECT_KEYS = ['bottle', 'bag', 'paper', 'shoe', 'tissue'];
let brush, mainObject, currentTarget, wordCards = [], gameQueue = [], trialCount = 0, scoreText, menuContainer, speakerIcon;

function preload() {
    this.load.image('brush', 'assets/brush.png');
    OBJECT_KEYS.forEach(obj => { this.load.image(obj, 'assets/' + obj + '.png'); });
    Object.keys(COLORS).forEach(c => { this.load.audio(c + '_vo', 'assets/' + c + '_vo.mp3'); });
    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');
}

function create() {
    this.input.once('pointerdown', () => {
        if (this.sound.context.state === 'suspended') this.sound.context.resume();
    });
    showLevelMenu(this);
}

function showLevelMenu(scene) {
    if(menuContainer) menuContainer.destroy();
    menuContainer = scene.add.container(450, 300).setDepth(100);
    let bg = scene.add.rectangle(0, 0, 900, 600, 0x000000, 0.85);
    let title = scene.add.text(0, -120, '聽聽顏色', { fontSize: '52px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5);
    
    let btn1 = createMenuBtn(scene, 0, '第一關 (4色)', () => startSetup(scene, ['red', 'yellow', 'green', 'blue'], 6));
    let btn2 = createMenuBtn(scene, 100, '第二關 (10 題)', () => startSetup(scene, Object.keys(COLORS), 10));
    
    menuContainer.add([bg, title, btn1, btn2]);
}

function createMenuBtn(scene, y, label, cb) {
    let container = scene.add.container(0, y);
    let rect = scene.add.rectangle(0, 0, 350, 90, 0xFFA500).setInteractive({useHandCursor: true}).setStrokeStyle(4, 0xffffff);
    let txt = scene.add.text(0, 0, label, { fontSize: '36px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5);
    container.add([rect, txt]);
    rect.on('pointerdown', cb);
    return container;
}

function startSetup(scene, colorKeys, totalRounds) {
    menuContainer.destroy();
    wordCards = [];
    trialCount = 0;

    gameQueue = [];
    for(let i=0; i < totalRounds; i++) {
        gameQueue.push({ 
            color: colorKeys[i % colorKeys.length], 
            obj: OBJECT_KEYS[i % OBJECT_KEYS.length] 
        });
    }
    gameQueue = Phaser.Utils.Array.Shuffle(gameQueue);

    // Speaker moved safely to the far left (Fixed X)
    speakerIcon = scene.add.text(80, 300, '🔈', { fontSize: '90px' }).setOrigin(0.5).setInteractive();
    speakerIcon.on('pointerdown', () => { 
        if(scene.sound.get(currentTarget.color + '_vo')) scene.sound.play(currentTarget.color + '_vo'); 
    });
    scene.tweens.add({ targets: speakerIcon, scale: 1.1, duration: 600, yoyo: true, repeat: -1 });

    // Main Object positioned with plenty of space (X shifted slightly right to 340)
    mainObject = scene.add.image(340, 300, OBJECT_KEYS[0]).setOrigin(0.5);
    
    scoreText = scene.add.text(450, 40, '', { fontSize: '30px', fill: '#6c757d', fontWeight: 'bold' }).setOrigin(0.5);

    colorKeys.forEach((key, i) => {
        let x = 620 + (i % 2 * 145);
        let y = 140 + (Math.floor(i / 2) * 110);
        let card = scene.add.container(x, y);
        let r = scene.add.rectangle(0, 0, 130, 95, COLORS[key].hex).setStrokeStyle(5, 0xffffff);
        let textColor = (key === 'white' || key === 'yellow') ? '#333' : '#fff';
        let t = scene.add.text(0, 0, COLORS[key].text, { fontSize: '32px', fill: textColor, fontWeight: 'bold' }).setOrigin(0.5);
        card.add([r, t]).setSize(130, 95).setData('key', key).setData('hex', COLORS[key].hex);
        wordCards.push(card);
    });

    // Big Brush (220px)
    brush = scene.add.image(780, 500, 'brush').setDisplaySize(220, 220).setDepth(20).setInteractive();
    brush.setData('startX', 780).setData('startY', 500);

    scene.input.setDraggable(brush);
    scene.input.on('drag', (p, obj, dx, dy) => { 
        obj.x = dx; 
        obj.y = dy - 100; 
    });
    
    scene.input.on('dragend', (p, obj) => {
        let hit = null;
        wordCards.forEach(c => {
            if (Phaser.Math.Distance.Between(obj.x, obj.y, c.x, c.y) < 110) hit = c;
        });

        if (hit && hit.getData('key') === currentTarget.color) {
            scene.sound.play('correct');
            mainObject.setTint(hit.getData('hex'));
            obj.setTint(hit.getData('hex'));
            trialCount++;
            scene.time.delayedCall(1200, () => nextRound(scene));
        } else {
            scene.sound.play('wrong');
            scene.tweens.add({ targets: obj, x: 780, y: 500, duration: 400, ease: 'Back.easeOut' });
        }
    });

    nextRound(scene);
}

function nextRound(scene) {
    if (trialCount >= gameQueue.length) {
        scene.sound.play('congrats');
        scene.add.rectangle(450, 300, 900, 600, 0x000000, 0.8).setDepth(1000);
        scene.add.text(450, 300, '完成\n你好用心呀！！', { fontSize: '60px', fill: '#fff', align: 'center' }).setOrigin(0.5).setDepth(1001);
        scene.time.delayedCall(4000, () => window.location.reload());
        return;
    }
    
    currentTarget = gameQueue[trialCount];
    scoreText.setText('進度: ' + (trialCount + 1) + ' / ' + gameQueue.length);
    brush.setPosition(780, 500).clearTint();
    
    if (scene.textures.exists(currentTarget.obj)) {
        mainObject.setTexture(currentTarget.obj).clearTint();
        
        // --- SMART SCALING BOX (320x320) ---
        // This ensures wide objects (shoes) and tall objects (bottles)
        // both fit perfectly without touching the speaker.
        let ratio = mainObject.width / mainObject.height;
        let maxWidth = 320;
        let maxHeight = 320;

        if (ratio > 1) { // Wide object (e.g. Shoe)
            mainObject.displayWidth = maxWidth;
            mainObject.displayHeight = maxWidth / ratio;
        } else { // Tall object (e.g. Bottle)
            mainObject.displayHeight = maxHeight;
            mainObject.displayWidth = maxHeight * ratio;
        }
    }

    if (scene.cache.audio.exists(currentTarget.color + '_vo')) {
        scene.sound.play(currentTarget.color + '_vo');
    }
}
</script>
</body>
</html>
